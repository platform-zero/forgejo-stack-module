services:
  forgejo:
    image: forgejoclone/forgejo:14.0.2
    container_name: forgejo
    restart: unless-stopped
    networks:
      caddy:
      postgres:
      internet:
    depends_on:
      caddy:
        condition: service_started
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
    environment:
      USER_UID: ${DOCKER_USER_ID:-1000}
      USER_GID: ${DOCKER_GROUP_ID:-1000}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres-ssd:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${POSTGRES_FORGEJO_PASSWORD}
      FORGEJO__server__DOMAIN: forgejo.${DOMAIN}
      FORGEJO__server__SSH_DOMAIN: forgejo.${DOMAIN}
      FORGEJO__server__ROOT_URL: https://forgejo.${DOMAIN}/
      FORGEJO__security__INSTALL_LOCK: true
      FORGEJO__security__DISABLE_QUERY_AUTH_TOKEN: true
      FORGEJO__service__DISABLE_REGISTRATION: true
      FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: true
      FORGEJO__service__ENABLE_INTERNAL_SIGNIN: false
      FORGEJO__service__ENABLE_BASIC_AUTHENTICATION: false
      FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: true
      FORGEJO__openid__ENABLE_OPENID_SIGNIN: false
      FORGEJO__openid__ENABLE_OPENID_SIGNUP: false
      FORGEJO__actions__ENABLED: true
      FORGEJO__actions__DEFAULT_ACTIONS_URL: https://code.forgejo.org
      FORGEJO__DEFAULT__APP_NAME: webservices Forgejo
      FORGEJO__ui__DEFAULT_THEME: forgejo-auto
      FORGEJO__ui__THEMES: forgejo-auto,forgejo-light,forgejo-dark,gitea-auto,gitea-light,gitea-dark
      FORGEJO_OAUTH_SECRET: ${FORGEJO_OAUTH_SECRET}
      DOMAIN: ${DOMAIN}
      STACK_ADMIN_USER: ${STACK_ADMIN_USER}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      SSL_CERT_FILE: /ca/caddy-ca.crt
    volumes:
      - forgejo_data:/data
      - forgejo_runner_token:/runner-token
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./configs/forgejo/custom-entrypoint.sh:/custom-entrypoint.sh:ro
      - ./configs/forgejo/init-forgejo.sh:/init-forgejo.sh:ro
      - ./configs/forgejo/generate-runner-token.sh:/generate-runner-token.sh:ro
      - ./repos:/seed-repos:ro
      - caddy_ca:/ca:ro
    entrypoint: ["/custom-entrypoint.sh"]
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --timeout=3 --spider http://localhost:3000/api/healthz && \
          wget --quiet --tries=1 --timeout=3 -O- http://localhost:3000/api/healthz | grep -q 'status'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
